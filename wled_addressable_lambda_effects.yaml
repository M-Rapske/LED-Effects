- addressable_lambda:
    name: "WLED Scan"
    update_interval: 30ms
    lambda: |-
      static int p = 0;
      static int d = 1;
      for (int i = 0; i < it.size(); i++) {
        uint8_t rr = it[i].get_red();
        uint8_t gg = it[i].get_green();
        uint8_t bb = it[i].get_blue();
        it[i] = Color((rr > 20) ? rr - 20 : 0, (gg > 20) ? gg - 20 : 0, (bb > 20) ? bb - 20 : 0);
      }
      if (it.size() > 0) it[p] = Color(183, 173, 176);
      p += d;
      if (p <= 0 || p >= it.size() - 1) d = -d;

