- addressable_lambda:
    name: "WLED Colorloop"
    update_interval: 50ms
    lambda: |-
      static float off = 0.0f;
      off += 1.1f;
      int n = it.size();
      for (int i = 0; i < n; i++) {
        float h = fmodf((float(i) * 360.0f / float(n == 0 ? 1 : n)) + off, 360.0f);
        float rr, gg, bb;
        hsv_to_rgb(h, 1.0f, 1.0f, rr, gg, bb);
        it[i] = Color(uint8_t(rr * 255), uint8_t(gg * 255), uint8_t(bb * 255));
      }

