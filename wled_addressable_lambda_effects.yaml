# Vollständige große WLED-inspirierte Effektliste als einzelne ESPHome addressable_lambda-Effekte.
# Jeder Effekt ist ein eigener addressable_lambda-Block; Farbvarianten nutzen zufällige/feste Farben.

- addressable_lambda:
    name: "WLED Solid"
    update_interval: 20ms
    lambda: |-
      static float t = 0.0f;
      t += 0.08f;
      for (int i = 0; i < it.size(); i++) {
        float x = sinf(i * 0.22f + t) * 0.5f + 0.5f;
        it[i] = Color(uint8_t(255 * x), uint8_t((50 * x)), uint8_t(255 * (1.0f - x)));
      }

- addressable_lambda:
    name: "WLED Blink"
    update_interval: 30ms
    lambda: |-
      bool on = ((millis() / 70) % 2) == 0;
      it.all() = on ? Color(53, 97, 193) : Color::BLACK;

- addressable_lambda:
    name: "WLED Breathe"
    update_interval: 40ms
    lambda: |-
      static int p = 0;
      int n = it.size();
      it.all() = Color::BLACK;
      if (n == 0) return;
      it[p % n] = Color(62, 134, 218);
      p = (p + 1) % n;

- addressable_lambda:
    name: "WLED Wipe"
    update_interval: 50ms
    lambda: |-
      for (int i = 0; i < it.size(); i++) {
        uint8_t r = it[i].get_red();
        uint8_t g = it[i].get_green();
        uint8_t b = it[i].get_blue();
        it[i] = Color((r > 18) ? r - 18 : 0, (g > 18) ? g - 18 : 0, (b > 18) ? b - 18 : 0);
      }
      if (it.size() > 0 && (random_uint32() % 3 == 0)) {
        it[random_uint32() % it.size()] = Color(39, 87, 129);
      }

- addressable_lambda:
    name: "WLED Wipe Random"
    update_interval: 60ms
    lambda: |-
      static int off = 0;
      off++;
      for (int i = 0; i < it.size(); i++) {
        uint8_t wheel = uint8_t((i * 256 / (it.size() == 0 ? 1 : it.size()) + off * 3) & 255);
        if (wheel < 85) it[i] = Color(255 - wheel * 3, wheel * 3, 0);
        else if (wheel < 170) { wheel -= 85; it[i] = Color(0, 255 - wheel * 3, wheel * 3); }
        else { wheel -= 170; it[i] = Color(wheel * 3, 0, 255 - wheel * 3); }
      }

- addressable_lambda:
    name: "WLED Random Colors"
    update_interval: 20ms
    lambda: |-
      float t = millis() / 500.0f;
      for (int i = 0; i < it.size(); i++) {
        float h = fmodf(float((i * 12 + int(t * 20)) % 360), 360.0f);
        float r, g, b;
        hsv_to_rgb(h, 1.0f, 1.0f, r, g, b);
        it[i] = Color(uint8_t(r * 255), uint8_t(g * 255), uint8_t(b * 255));
      }

- addressable_lambda:
    name: "WLED Sweep"
    update_interval: 30ms
    lambda: |-
      static int a = 0;
      static int d = 1;
      int n = it.size();
      it.all() = Color::BLACK;
      if (n == 0) return;
      int b = n - 1 - a;
      it[a] = Color(66, 102, 138);
      if (b >= 0 && b < n) it[b] = Color(186, 222, 246);
      a += d;
      if (a <= 0 || a >= (n / 2)) d = -d;

