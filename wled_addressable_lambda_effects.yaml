- addressable_lambda:
    name: "WLED Red & Blue"
    update_interval: 20ms
    lambda: |-
      static int t = 0;
      t++;
      int n = it.size();
      int half = n / 2;
      bool left = (t % 12 < 2) || (t % 12 >= 4 && t % 12 < 6);
      bool right = (t % 12 >= 7 && t % 12 < 9) || (t % 12 >= 10);
      for (int i = 0; i < half; i++) it[i] = left ? Color(255, 0, 0) : Color::BLACK;
      for (int i = half; i < n; i++) it[i] = right ? Color(0, 0, 255) : Color::BLACK;

