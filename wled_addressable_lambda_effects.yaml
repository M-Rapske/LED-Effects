- addressable_lambda:
    name: "WLED Rolling Balls"
    update_interval: 20ms
    lambda: |-
      static float t = 0.0f;
      t += 0.14f;
      it.all() = Color::BLACK;
      int n = it.size();
      if (n == 0) return;
      for (int k = 0; k < 4; k++) {
        int p = int((sinf(t * (k + 1) * 0.73f) + 1.0f) * 0.5f * (n - 1));
        if (k == 0) it[p] = Color(255, 0, 0);
        if (k == 1) it[p] = Color(0, 255, 0);
        if (k == 2) it[p] = Color(0, 0, 255);
        if (k == 3) it[p] = Color(255, 255, 0);
      }

