# WLED-inspirierte Effekte als einzelne ESPHome addressable_lambda-Effekte.
# Überarbeitet: Effektlogik ist jetzt pro Effektname semantisch zugeordnet (z.B. Chase/Scan/Twinkle/Fire/Ripple usw.).
# Hinweis: Das ist eine bestmögliche ESPHome-Annäherung, kein 1:1-Port der WLED-C++-Engine.

- addressable_lambda:
    name: "WLED Solid"
    update_interval: 20ms
    lambda: |-
      it.all() = Color(74, 128, 155);

- addressable_lambda:
    name: "WLED Blink"
    update_interval: 30ms
    lambda: |-
      bool on = ((millis() / 90) % 2) == 0;
      it.all() = on ? Color(150, 69, 122) : Color::BLACK;

- addressable_lambda:
    name: "WLED Breathe"
    update_interval: 40ms
    lambda: |-
      float t = (sinf(millis() / 650.0f) + 1.0f) * 0.5f;
      it.all() = Color(uint8_t(141 * t), uint8_t(69 * t), uint8_t(93 * t));

- addressable_lambda:
    name: "WLED Wipe"
    update_interval: 50ms
    lambda: |-
      static int p = 0;
      int n = it.size();
      for (int i = 0; i < n; i++) it[i] = (i <= p) ? Color(158, 107, 126) : Color::BLACK;
      p++;
      if (p >= n) p = 0;

- addressable_lambda:
    name: "WLED Wipe Random"
