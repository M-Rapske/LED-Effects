- addressable_lambda:
    name: "WLED Random Colors"
    update_interval: 20ms
    lambda: |-
      static float t = 0.0f;
      t += 0.1f;
      for (int i = 0; i < it.size(); i++) {
        float x = (sinf(t + i * 0.25f) + 1.0f) * 0.5f;
        it[i] = Color(uint8_t(110 * x), uint8_t(110 * x), uint8_t(105 * x));
      }

