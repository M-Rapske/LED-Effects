            }
      - addressable_lambda:
          name: "Dual Start Effect"
          update_interval: 16ms
          lambda: |-
           
            static int step = 0;
            if (initial_run) {
            step = 0;
            it.all() = Color::BLACK;
            // optionally do a return so nothing happens until the next update_interval
            return;
            }
            int center_left = (it.size() / 2);
            int center_right = ((it.size() / 2)+1);

            int left = center_left - step;
            int right = center_right + step;

            if (left >= 0)
              it[left] = Color(255, 170, 66);
            if (right < it.size())
              it[right] = Color(255, 170, 66);

            step++;
            if (left <= 0 && right >= it.size() - 1) {
              step = it.size(); // Stoppen
            }
      - addressable_lambda:
          name: "Zuckerstange Laufend"
          update_interval: 100ms
          lambda: |-
            static int offset = 0;
            // Länge eines Farbblocks (z.B. 3 LEDs rot, 3 LEDs weiß)
            const int block_size = 15;
            for (int i = 0; i < it.size(); i++) {
              int pos = (i + offset) / block_size;
            if (pos % 2 == 0) {
              // Rot
              it[i] = Color(255, 0, 0);
            } else {
              // Weiß
              it[i] = Color(255, 220, 200);
            }
            }

            // Bewegung von oben nach unten
            offset++;
            if (offset >= block_size * 2) {
            offset = 0;
            }
