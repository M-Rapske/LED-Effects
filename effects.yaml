      - addressable_lambda:
          name: "Rolling Balls (10 Bälle)"
          update_interval: 30ms
          lambda: |-
            static float pos[10] = {0, float ((it.size() / 10) * 1), float ((it.size() / 10) * 2), float ((it.size() / 10) * 3), float ((it.size() / 10) * 4), float ((it.size() / 10) * 5), float ((it.size() / 10) * 6), float ((it.size() / 10) * 7), float ((it.size() / 10) * 8), float ((it.size() / 10) * 9)};
            float speed = 0.8;

            // Farben der 10 Bälle
            Color colors[10] = {
              Color(255, 0, 0),     // Rot
              Color(255, 128, 0),   // Orange
              Color(255, 255, 0),   // Gelb
              Color(0, 255, 0),     // Grün
              Color(0, 255, 255),   // Cyan
              Color(0, 0, 255),     // Blau
              Color(128, 0, 255),   // Violett
              Color(255, 0, 255),   // Magenta
              Color(255, 0, 128),   // Pink
              Color(255, 255, 255)  // Weiß
            };

            // Abdunkeln aller LEDs (Trail)
            for (int i = 0; i < it.size(); i++) {
              uint8_t r = it[i].get_red();
              uint8_t g = it[i].get_green();
              uint8_t b = it[i].get_blue();

              r = (r > 10) ? r - 10 : 0;
              g = (g > 10) ? g - 10 : 0;
              b = (b > 10) ? b - 10 : 0;

              it[i] = Color(r, g, b);
            }

            // Bälle bewegen und setzen
            for (int i = 0; i < 10; i++) {
              pos[i] += speed;
              if (pos[i] >= it.size()) pos[i] -= it.size();
              it[int(pos[i])] = colors[i];
            }
      - addressable_lambda:
          name: "Mint → Blau → Lila Verlauf"
          update_interval: 16ms
          lambda: |-
            int midpoint = it.size() / 2;
            for (int i = 0; i < it.size(); i++) {
              float red, green, blue;

              if (i <= midpoint) {
                // Mintgrün (62%, 100%, 87%) → Blau (0%, 0%, 100%)
                float ratio = float(i) / float(midpoint);
                red = (0.62 * (1.0 - ratio));
                green = (1.0 * (1.0 - ratio));
                blue = 0.87 + (0.13 * ratio); // geht von 87% zu 100%
              } else {
                // Blau (0%, 0%, 100%) → Lila (100%, 0%, 100%)
                float ratio = float(i - midpoint) / float(it.size() - midpoint - 1);
                red = ratio;
                green = 0.0;
                blue = 1.0;
              }

              it[i] = Color(red * 255, green * 255, blue * 255);
            }
      - addressable_lambda:
          name: "Blau zu Lila Verlauf"
          update_interval: 16ms
          lambda: |-
            for (int i = 0; i < it.size(); i++) {
              float ratio = float(i) / float(it.size() - 1);
              // Farbverlauf von Blau (0,0,1) nach Lila (1,0,1)
              float red = ratio;
              float green = 0.0;
              float blue = 1.0;
              it[i] = Color(red * 255, green * 255, blue * 255);
            }
