      - addressable_lambda:
          name: "Regenbogen"
          update_interval: 16ms
          lambda: |-
            static float offset = 0.0f;
            offset += 1.0f;   // Geschwindigkeit in Grad
            if (offset >= 360.0f) offset -= 360.0f;

            int num = it.size();

            for (int i = 0; i < num; i++) {
              float position = (float)i / (float)num;
              float hue = (position * 360.0f) + offset;
              if (hue >= 360.0f) hue -= 360.0f;

              float r, g, b;
              hsv_to_rgb(hue, 1.0f, 1.0f, r, g, b);

              it[i] = Color(
                uint8_t(r * 255),
                uint8_t(g * 255),
                uint8_t(b * 255)
              );
            }
